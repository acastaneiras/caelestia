### Monitors ###
monitor = HDMI-A-1, 1920x1080@165, 0x360, 1 # Primary
monitor = DP-3, 2560x1440@165, 1920x0, 1

### Workspaces ###
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:HDMI-A-1, default:true
workspace = 4-10, monitor:HDMI-A-1

### Mouse ###
input {
    sensitivity = 0.0000
    force_no_accel=true
    accel_profile = flat
    kb_layout = eu, es # eu => eurkey
    kb_options = grp:alt_shift_toggle
}
# No anims!!
animation = workspaces, 0, 1, specialWorkSwitch

# Binds
unbind = Super, C
bind = Super, Return, exec, $terminal
bind = Super, C, killactive,

### Misc ###
general {
    border_size = 2
}

